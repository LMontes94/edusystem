version: '3.9'

# ──────────────────────────────────────────────
# EduSystem — Docker Compose
# v2.1 — SaaS Ready
#
# Servicios:
#   postgres     → Base de datos principal
#   redis        → Cache + colas BullMQ + Socket.io adapter
#   api          → NestJS REST API + WebSockets
#   worker       → BullMQ workers (notificaciones, PDFs, auditoría)
#   web          → Next.js panel admin
#   bull-board   → UI para monitorear colas (solo dev)
#   minio        → Almacenamiento S3-compatible (self-hosted)
#
# Uso:
#   Desarrollo:  docker-compose up -d
#   Producción:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────

x-api-env: &api-env
  NODE_ENV: ${NODE_ENV:-development}
  PORT: 4000
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-edusystem_pass}@postgres:5432/${POSTGRES_DB:-edusystem}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-in-production}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
  # Storage
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-edusystem_access}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-edusystem_secret_key_change_me}
  MINIO_BUCKET: ${MINIO_BUCKET:-edusystem}
  MINIO_USE_SSL: 'false'
  # Push notifications
  FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
  FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
  FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
  # BullMQ queues
  BULL_QUEUE_NOTIFICATIONS: notifications
  BULL_QUEUE_PDF: pdf-generation
  BULL_QUEUE_AUDIT: audit-log
  BULL_QUEUE_GRADES: grade-processing

services:

  # ────────────────────────────
  # DATABASE
  # ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edusystem-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edusystem_pass}
      POSTGRES_DB: ${POSTGRES_DB:-edusystem}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de init: crea el índice parcial para SUPER_ADMIN (email único con institutionId null)
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ${POSTGRES_DB:-edusystem}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────
  # REDIS — Cache + BullMQ + Socket.io adapter
  # ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edusystem-redis
    restart: unless-stopped
    # Persistencia AOF: no perder jobs de BullMQ ante restart
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────
  # API — NestJS
  # ────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: edusystem-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *api-env
    ports:
      - '4000:4000'
    volumes:
      # Solo en desarrollo: hot reload
      - ./backend/src:/app/src:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ────────────────────────────
  # WORKER — BullMQ
  # Separado de la API para escalar independientemente.
  # Procesa en background: notificaciones, PDFs, auditoría, promedios.
  # ────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: edusystem-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *api-env
      # Indica al entrypoint que arranque en modo worker (sin HTTP server)
      APP_MODE: worker
    # Sin ports: el worker no expone HTTP
    volumes:
      - ./backend/src:/app/src:ro

  # ────────────────────────────
  # BULL BOARD — UI de colas (solo desarrollo)
  # http://localhost:3001
  # ────────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: edusystem-bull-board
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - '3001:3000'
    profiles:
      - dev # solo levanta con: docker-compose --profile dev up

  # ────────────────────────────
  # FRONTEND — Next.js
  # ────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: edusystem-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-in-production}
      API_URL: http://api:4000/api/v1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src:ro

  # ────────────────────────────
  # MINIO — Storage S3-compatible (self-hosted)
  # Console: http://localhost:9001
  # ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: edusystem-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-edusystem_access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-edusystem_secret_key_change_me}
    ports:
      - '9000:9000'  # API S3
      - '9001:9001'  # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

# ────────────────────────────
# VOLUMES
# ────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ────────────────────────────
# NETWORKS
# Red interna para que los servicios se comuniquen
# sin exponer puertos innecesarios al host.
# ────────────────────────────
networks:
  default:
    name: edusystem-network
    driver: bridge
